name: CD
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/semantiq/backend:latest
            ghcr.io/semantiq/backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/semantiq/frontend:latest
            ghcr.io/semantiq/frontend:${{ github.sha }}

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: worker/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/semantiq/worker:latest
            ghcr.io/semantiq/worker:${{ github.sha }}

