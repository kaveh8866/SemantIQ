<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>SemantIQ Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    header { margin-bottom: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f2f2f2; }
    .title { font-size: 20px; font-weight: bold; }
    .subtitle { color: #666; }
  </style>
</head>
<body>
  <header>
    <div class="title">SemantIQ Dashboard</div>
    <div class="subtitle">Model Runs and Evaluation Scores</div>
    <nav>
      <a href="/">Home</a> | <a href="/runs">Model Runs</a> | <a href="/benchmarks">Benchmark Performance</a>
    </nav>
  </header>
  {% block content %}{% endblock %}
</body>
</html>
