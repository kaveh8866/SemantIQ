{% extends "base.html" %}
{% block content %}
<h2>Benchmark Performance</h2>
<table>
  <thead>
    <tr><th>Benchmark</th><th>Model</th><th>Avg Score</th></tr>
  </thead>
  <tbody>
    {% for row in rows %}
      {% for m in row.models %}
      <tr>
        <td>{{ row.benchmark_id }}</td>
        <td>{{ m.model }}</td>
        <td>{{ '%.3f'|format(m.score) }}</td>
      </tr>
      {% endfor %}
    {% endfor %}
  </tbody>
</table>
{% endblock %}
